{% extends 'base.html' %}
{% block title %}Register – AI Health Advisor{% endblock %}

{% block extra_css %}
<style>
.auth-container {
    min-height: calc(100vh - 64px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, #f0f4f8 0%, #e3f2fd 100%);
}
.auth-card {
    background: white;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(15,76,129,0.15);
    padding: 2.5rem;
    width: 100%;
    max-width: 580px;
}
.auth-header { text-align: center; margin-bottom: 2rem; }
.auth-header .auth-icon {
    width: 70px; height: 70px;
    background: linear-gradient(135deg, #16634f, #15a07b);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    margin: 0 auto 1rem;
    box-shadow: 0 8px 20px rgba(15,76,129,0.3);
}
.auth-header h2 { font-family: 'Poppins', sans-serif; font-size: 1.6rem; font-weight: 700; color: black; }
.auth-header p { color: #16634f; margin-top: 0.5rem; font-size: 0.9rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.input-group { position: relative; }
.input-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #16634f;
    font-size: 0.9rem;
}
.input-group .form-control { padding-left: 36px; }
.auth-footer { text-align: center; margin-top: 1.5rem; color: #16634f; font-size: 0.9rem; }
.auth-footer a { color: #16634f; font-weight: 700; text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">👤</div>
            <h2>Create Your Account</h2>
            <p>Join AI Health Advisor for personalized health insights</p>
        </div>

        <form method="POST" action="{% url 'user_register' %}">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" name="name" class="form-control" placeholder="Your full name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-group">
                        <i class="fas fa-at input-icon"></i>
                        <input type="text" name="loginid" class="form-control" placeholder="Choose username" required>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <div class="input-group">
                    <i class="fas fa-phone input-icon"></i>
                    <input type="text" name="mobile" class="form-control" placeholder="10-digit mobile number" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Age</label>
                    <div class="input-group">
                        <i class="fas fa-birthday-cake input-icon"></i>
                        <input type="number" name="age" class="form-control" placeholder="Your age" min="1" max="120">
                    </div>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender" class="form-control">
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="password" class="form-control" placeholder="Create password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password" required>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:0.5rem;">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{% url 'user_login' %}">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
